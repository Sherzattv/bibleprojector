<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#6366f1">
    <meta name="description" content="Приложение для трансляции библейских стихов на проектор">
    <meta name="robots" content="noindex, nofollow">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icons/logo.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/logo.svg">
    <title>Bible Projector</title>

    <!-- Font Preload for performance -->
    <link rel="preload"
        href="https://fonts.gstatic.com/s/inter/v13/UcCO3FwrK3iLTeHuS_fvQtMwCp50KnMw2boKoduKmMEVuLyfAZ9hjp-Ek-_EeA.woff2"
        as="font" type="font/woff2" crossorigin>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/controller.css">
</head>

<body>
    <div class="app">
        <!-- Mobile Menu Toggle -->
        <button id="menu-toggle" class="btn-icon menu-toggle" aria-label="Открыть меню" aria-expanded="false">☰</button>
        <div id="sidebar-overlay" class="sidebar-overlay"></div>

        <!-- Sidebar -->
        <aside class="sidebar" role="complementary" aria-label="История и настройки">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon" aria-hidden="true">✦</div>
                    <span class="logo-text">Bible Projector</span>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="section-header">
                    <span class="section-title">История</span>
                    <button class="btn-icon" onclick="clearHistory()" title="Очистить историю"
                        aria-label="Очистить историю">🗑</button>
                </div>
                <div id="history" class="history-list" role="list" aria-label="История стихов">
                    <!-- History items rendered via JS -->
                </div>
            </div>

            <div class="sidebar-footer">
                <button class="btn btn-secondary" onclick="toggleSettings()" style="width: 100%;"
                    aria-label="Открыть настройки экрана">
                    ⚙️ Настройки экрана
                </button>
                <button class="btn btn-secondary" onclick="openDisplayWindow()" style="width: 100%;"
                    aria-label="Открыть экран проектора">
                    🖥️ Открыть экран
                </button>

            </div>
        </aside>

        <!-- Main -->
        <main class="main" role="main">
            <!-- Search Row -->
            <div class="search-row">
                <div class="search-container">
                    <span class="search-icon" aria-hidden="true">🔍</span>
                    <input type="text" id="search-input" class="search-input"
                        placeholder="Введите ссылку на стих (Ин 3:16, Быт 1:1-3...)" autocomplete="off"
                        aria-label="Поиск стиха">
                </div>
                <button class="btn btn-secondary" onclick="openTextSearch()" title="Поиск по тексту"
                    aria-label="Открыть поиск по тексту">
                    📖 Текст
                </button>
                <select id="translation-select" class="translation-select" aria-label="Выбор перевода">
                    <option value="RST">Синодальный</option>
                    <option value="NRT">НРП</option>
                    <option value="KTB">Казахский (KTB)</option>
                    <option value="KYB">Кыргызский (KYB)</option>
                </select>
                <div id="status" class="status-pill" role="status" aria-live="polite">⏳ Готов</div>
            </div>

            <!-- Bento Grid -->
            <div class="bento-grid">
                <!-- Preview Card (Large) -->
                <div class="bento-card large">
                    <div class="card-header">
                        <span class="card-label">Предпросмотр</span>
                        <div class="card-actions">
                            <button class="btn-icon" id="btn-edit" onclick="toggleEditMode()" title="Редактировать"
                                aria-label="Редактировать стих">✏️</button>
                            <button class="btn btn-ghost" id="btn-save" onclick="saveEdit()"
                                style="display:none;">Сохранить</button>
                            <button class="btn btn-ghost" id="btn-cancel" onclick="cancelEdit()"
                                style="display:none;">Отмена</button>
                        </div>
                    </div>
                    <div class="verse-content">
                        <div id="verse-text" class="verse-text placeholder">
                            Введите ссылку и нажмите Enter для поиска стиха...
                        </div>
                        <textarea id="edit-area" class="edit-area" aria-label="Редактирование текста стиха"></textarea>
                        <div id="verse-ref" class="verse-ref"></div>
                    </div>
                </div>

                <!-- Quick Note Card -->
                <div class="bento-card">
                    <div class="card-header">
                        <span class="card-label">Быстрая Заметка</span>
                        <div class="card-actions">
                            <button class="btn btn-primary btn-sm" onclick="showNote()"
                                style="font-size: 13px; padding: 8px 16px;" aria-label="Транслировать заметку">
                                📡 В Эфир
                            </button>
                        </div>
                    </div>
                    <div style="display: flex; flex-direction: column; height: 100%;">
                        <textarea id="note-input" class="edit-area active"
                            style="flex:1; font-size:16px; padding:16px; display:block; min-height: 120px; resize: none;"
                            placeholder="Введите текст объявления..." aria-label="Текст заметки"></textarea>
                    </div>
                </div>

                <!-- Live Control Card -->
                <div class="bento-card">
                    <div class="card-header">
                        <span class="card-label">Эфир</span>
                        <div class="status-indicator live-pulse"></div>
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 12px; flex: 1;">
                        <button class="btn btn-success" id="btn-broadcast" onclick="broadcastToDisplay()" disabled
                            style="width: 100%; height: 50px; font-size: 15px;" aria-label="Транслировать стих">
                            📡 Стих в Эфир
                        </button>

                        <!-- Navigation buttons -->
                        <div style="display: flex; gap: 8px;">
                            <button class="btn btn-secondary" onclick="goToPrevVerse()"
                                style="flex: 1; padding: 10px 16px; display: flex; align-items: center; justify-content: center; gap: 6px;"
                                title="Предыдущий стих (↑)" aria-label="Предыдущий стих">
                                <span style="font-size: 12px;">◀</span>
                                <span>Пред</span>
                            </button>
                            <button class="btn btn-secondary" onclick="goToNextVerse()"
                                style="flex: 1; padding: 10px 16px; display: flex; align-items: center; justify-content: center; gap: 6px;"
                                title="Следующий стих (↓)" aria-label="Следующий стих">
                                <span>След</span>
                                <span style="font-size: 12px;">▶</span>
                            </button>
                        </div>

                        <button class="btn btn-secondary" onclick="hideFromDisplay()" title="Очистить экран"
                            style="width: 100%; color: var(--text-tertiary); border-style: dashed;"
                            aria-label="Скрыть с экрана">
                            ⬛ Скрыть (Esc)
                        </button>
                    </div>

                    <div
                        style="margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--glass-border); font-size: 11px; color: var(--text-tertiary); text-align: center;">
                        ↑↓ = Навигация • Ctrl+Enter = Эфир
                    </div>
                </div>


            </div>
        </main>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="settings-title">
        <div class="modal">
            <div class="modal-header">
                <h2 id="settings-title" class="modal-title">Настройки экрана</h2>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label" for="font-select">Шрифт стихов</label>
                    <select id="font-select" class="form-select">
                        <option value="'Playfair Display', serif">Playfair Display</option>
                        <option value="'Inter', sans-serif">Inter</option>
                        <option value="'Georgia', serif">Georgia</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="theme-select">Тема фона</label>
                    <select id="theme-select" class="form-select">
                        <option value="blue">Глубокий Синий</option>
                        <option value="black">Чёрный (OLED)</option>
                        <option value="forest">Зелёный</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="size-range">Размер текста</label>
                    <input type="range" id="size-range" class="form-range" min="80" max="150" value="100">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="toggleSettings()">Готово</button>
            </div>
        </div>
    </div>

    <!-- Text Search Modal -->
    <div id="text-search-modal" class="modal-overlay" role="dialog" aria-modal="true"
        aria-labelledby="text-search-title">
        <div class="modal" style="width: 600px;">
            <div class="modal-header">
                <h2 id="text-search-title" class="modal-title">📖 Поиск по тексту</h2>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <input type="text" id="text-search-input" class="search-input"
                        placeholder="Введите слово или фразу для поиска..."
                        style="padding-left: 16px; margin-bottom: 16px;" aria-label="Текст для поиска">
                </div>
                <div id="text-search-results" class="search-results" role="list" aria-label="Результаты поиска"
                    style="max-height: 400px; overflow-y: auto;">
                    <div class="search-results-placeholder"
                        style="color: var(--text-tertiary); text-align: center; padding: 40px;">
                        Введите текст и нажмите Enter
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <span id="text-search-count" style="color: var(--text-tertiary); margin-right: auto;"></span>
                <button class="btn btn-secondary" onclick="closeTextSearch()">Закрыть</button>
            </div>
        </div>
    </div>

    <!-- Loading -->
    <div id="loading" class="loading-overlay" role="status" aria-label="Загрузка">
        <div class="loader" aria-hidden="true"></div>
        <div class="loading-text">Загрузка Библии...</div>
        <div id="loading-progress" class="loading-progress">
            <div id="loading-bar" class="loading-bar"></div>
        </div>
        <div id="loading-status" class="loading-status">0 / 4 переводов</div>
    </div>

    <!-- Data Scripts (non-module, load first) -->
    <script src="js/data/bible_data.js"></script>
    <script src="js/data/nrt_data.js"></script>
    <script src="js/data/ktb_data.js"></script>
    <script src="js/data/kyb_data.js"></script>

    <!-- Main Application (ES Module) -->
    <script type="module" src="js/app.js"></script>

    <!-- Legacy global functions for onclick handlers -->
    <script>
        // These will be set by app.js via window assignments
        // They exist here as placeholders to prevent errors during load
    </script>
</body>

</html>
